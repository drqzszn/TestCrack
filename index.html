<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>题库读取器</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f3f7f4;
    font-family:sans-serif;
    padding:20px;
}

.box{
    max-width:500px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 6px 25px rgba(0,0,0,0.08);
}

h1{
    text-align:center;
    color:#1f6b45;
    font-size:24px;
    margin-bottom:18px;
}

input[type=file]{
    width:100%;
    padding:10px;
    border:1px solid #d4e3da;
    border-radius:12px;
    background:#f8fbf9;
    margin-bottom:15px;
}

.title{
    font-size:14px;
    font-weight:bold;
    color:#1f6b45;
    margin-bottom:6px;
}

textarea{
    width:100%;
    height:140px;
    resize:none;
    border:1px solid #d4e3da;
    border-radius:12px;
    padding:12px;
    font-size:14px;
    background:#f8fbf9;
    margin-bottom:15px;
    outline:none;
}

.api{
    background:#f8fbf9;
    border:1px solid #d4e3da;
    border-radius:12px;
    padding:12px;
    font-size:13px;
    word-break:break-all;
    line-height:1.5;
    color:#1f6b45;
    margin-bottom:15px;
}

button{
    width:100%;
    border:none;
    background:#2b7a4e;
    color:white;
    padding:12px;
    border-radius:12px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#205f3d;
}

</style>
</head>

<body>

<div class="box">

    <h1>📋 题库读取器</h1>

    <input type="file" id="htmlFile" accept=".html">

    <div class="title">
        正确答案
    </div>

    <textarea id="answerText" readonly>
请选择 1.html
    </textarea>

    <div class="title">
        当前接口
    </div>

    <div class="api" id="apiText">
        未读取
    </div>

    <button onclick="copyAnswer()">
        一键复制答案
    </button>

</div>

<script>

// 读取 html

document.getElementById("htmlFile")
.addEventListener("change",function(e){

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(){

        try{

            const html = reader.result;

            // 提取 QUESTION_SET

            const match = html.match(
                /const\s+QUESTION_SET\s*=\s*(\[[\s\S]*?\]);/
            );

            if(match){

                const QUESTION_SET = new Function(
                    "return " + match[1]
                )();

                const answers = QUESTION_SET.map(q=>{

                    const index =
                    q.options.indexOf(q.correct);

                    return ["A","B","C","D"][index] || "?";

                }).join("");

                document.getElementById("answerText")
                .value = answers;

            }else{

                document.getElementById("answerText")
                .value = "未找到 QUESTION_SET";
            }

            // 提取接口

            const apiMatch = html.match(
                /fetch\(['"]([^'"]+)['"]/
            );

            if(apiMatch){

                document.getElementById("apiText")
                .innerText = apiMatch[1];

            }else{

                document.getElementById("apiText")
                .innerText = "未找到接口";
            }

        }catch(err){

            console.error(err);

            document.getElementById("answerText")
            .value = "解析失败";

            document.getElementById("apiText")
            .innerText = "解析失败";
        }
    };

    reader.readAsText(file);
});

// 复制答案

function copyAnswer(){

    const text =
    document.getElementById("answerText");

    navigator.clipboard.writeText(text.value);

    alert("已复制");
}

</script>

</body>
</html>
